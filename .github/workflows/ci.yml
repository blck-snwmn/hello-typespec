name: CI Check

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]


permissions:
  contents: read
jobs:
  typespec-check:
    name: TypeSpec Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Go for oapi-codegen
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'

      - name: Setup aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1

      - name: Verify oapi-codegen version
        run: oapi-codegen --version

      - name: Compile TypeSpec
        run: pnpm compile:spec

      - name: Generate all code
        run: pnpm generate:all

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Generated code is not up to date."
            git status --porcelain
            git diff
            exit 1
          fi

  typescript-check:
    name: TypeScript Build & Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm -F typescript typecheck

      - name: Build TypeScript
        run: pnpm -F typescript build

      - name: Run TypeScript tests with coverage
        run: pnpm -F typescript test --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: typescript-coverage
          path: typescript/coverage/

  go-check:
    name: Go Build & Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum

      - name: Setup aqua
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1

      - name: Install dependencies
        working-directory: ./go
        run: go mod download

      - name: Build Go code
        working-directory: ./go
        run: go build ./...

      - name: Run Go tests with coverage
        working-directory: ./go
        run: |
          go test -v -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: |
            go/coverage.out
            go/coverage.html

      - name: Check Go formatting
        working-directory: ./go
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Error: Go code is not formatted."
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        working-directory: ./go
        run: go vet ./...

      - name: Run tests with race detector
        working-directory: ./go
        run: go test -race ./...
